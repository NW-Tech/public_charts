apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certIssuer.name }}
spec:
  acme:
    email: {{ .Values.certIssuer.email }}
    server: {{ .Values.certIssuer.server }}
    privateKeySecretRef:
      name: {{ .Values.certIssuer.secretName }}
    solvers:
    {{- if .Values.httpSolverEnabled }}
    - http01:
        ingress:
          ingressClassName: {{ .Values.certIssuer.httpResolver.ingressClass }}
          ingressTemplate: {{ .Values.certIssuer.httpResolver.ingressTemplate | toYaml | nindent 12 }}
    {{- end }}
    {{- if .Values.dnsSolverEnabled }}
    - dns01:
        webhook:
          groupName: {{ .Values.global.groupName }}
          solverName: ovh
          config:
            endpoint: ovh-eu
            applicationKey: {{ .Values.dnsSolverApplicationKey }}
            applicationSecretRef:
              key: applicationSecret
              name: ovh-credentials
            consumerKey: {{ .Values.dnsSolverConsumerKey }}
    {{- end }}
