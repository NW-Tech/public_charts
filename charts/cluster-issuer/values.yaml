# Default values for clusterissuer.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

groupName: &groupName "test.nwstorm.io"
dnsSolverApplicationKey: &dnsSolverApplicationKey "63078835f84fafdd"
dnsSolverApplicationSecret: &dnsSolverApplicationSecret "c27c767020730b38d86c1b1ee5a5d107"
dnsSolverConsumerKey: &dnsSolverConsumerKey "e2489bf9d7b151551128d82fdca88cd3"
httpSolverEnabled: &httpSolverEnabled true
dnsSolverEnabled: &dnsSolverEnabled true

certIssuer:
  nameOverride: ""
  fullnameOverride: ""
  email: "vincent.dudek@nw-groupe.com" # This is a required field if create == true
  name: lets-encrypt-http-issuer-production
  secretName: letsencrypt-credentials
  server: https://acme-v02.api.letsencrypt.org/directory
  httpResolver:
    enabled: *httpSolverEnabled
    ingressClass: traefik
    ingressTemplate:
      metadata:
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
          traefik.ingress.kubernetes.io/router.priority: "1024"
  dnsResolver:
    enabled: *dnsSolverEnabled
    resolver: cert-manager-webhook-ovh
  resolvers: []
  extraSecrets:
    ovh-credentials:
      applicationSecret: *dnsSolverApplicationSecret

cert-manager-webhook-ovh:
  nameOverride: "cert-manager-webhook-ovh"
  fullnameOverride: "cert-manager-webhook-ovh"
  enabled: *dnsSolverEnabled
  groupName: *groupName
  resolver:
    webhook:
      groupName: *groupName
      solverName: ovh
      config:
        endpoint: ovh-eu
        applicationKey: *dnsSolverApplicationKey
        applicationSecretRef:
          key: applicationSecret
          name: ovh-credentials
        consumerKey: *dnsSolverConsumerKey
