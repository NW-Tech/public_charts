{{- /*
  fileSecrets — render one Opaque Secret per entry under .Values.fileSecrets.data.
  Each Secret holds a single key (`filename`) whose value is the file contents.
  `contentsRaw` is the already-base64-encoded file content — it is written to
  the Secret's `data` field verbatim, so Kubernetes will base64-decode it once
  on volume mount, restoring the original bytes on disk.
*/ -}}
{{- if .Values.fileSecrets.enabled -}}
{{- range $name, $spec := .Values.fileSecrets.data }}
{{- if not (hasKey $spec "contentsRaw") }}
  {{- fail (printf "fileSecrets.data.%s: 'contentsRaw' is required (already-base64 file content)" $name) }}
{{- end }}
{{- if not (hasKey $spec "filename") }}
  {{- fail (printf "fileSecrets.data.%s: 'filename' is required" $name) }}
{{- end }}
{{- if not (hasKey $spec "mountPath") }}
  {{- fail (printf "fileSecrets.data.%s: 'mountPath' is required" $name) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" $ }}-{{ $name }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
type: Opaque
data:
  {{ $spec.filename }}: {{ print $spec.contentsRaw | quote }}
---
{{- end }}
{{- end -}}
