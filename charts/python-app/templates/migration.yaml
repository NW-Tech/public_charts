{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "app.fullname" . }}-migrations
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.migrations.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    "helm.sh/hook-timeout": {{ .Values.migrations.hookTimeout | quote }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      name: {{ include "app.fullname" . }}-migrations
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: {{ .Values.migrations.restartPolicy }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.migrations.waitForDatabase.image }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for database..."
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER"; do
                sleep 2
              done
              echo "Database ready"
          env:
            # Database configuration (needed for pg_isready check)
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "app.fullname" . }}-configmap
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "app.fullname" . }}-configmap
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "app.fullname" . }}-configmap
                  key: DB_USER
            # Database password (needed for connection)
            {{- if .Values.secrets.enabled }}
            {{- if hasKey .Values.secrets.data "postgres-credentials" }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.fullname" . }}-postgres-credentials
                  key: DB_PASSWORD
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrations.waitForDatabase.resources | nindent 12 }}
      containers:
        - name: alembic-migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          env:
            # Force Python to be unbuffered for immediate log output
            - name: PYTHONUNBUFFERED
              value: "1"
            # Database configuration (needed for migrations)
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "app.fullname" . }}-configmap
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "app.fullname" . }}-configmap
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "app.fullname" . }}-configmap
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "app.fullname" . }}-configmap
                  key: DB_NAME
            # Database password (needed for migrations)
            {{- if .Values.secrets.enabled }}
            {{- if hasKey .Values.secrets.data "postgres-credentials" }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.fullname" . }}-postgres-credentials
                  key: DB_PASSWORD
            {{- end }}
            {{- end }}
            {{- /* env: append fileSecrets[*].env entries (deduped, last write wins) */ -}}
            {{- if .Values.fileSecrets.enabled }}
            {{- $envItems := dict }}
            {{- range $name, $spec := .Values.fileSecrets.data }}
            {{- if $spec.env }}
            {{- range $k, $v := $spec.env }}
            {{- $_ := set $envItems $k $v }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $k, $v := $envItems }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          {{- if and .Values.fileSecrets.enabled .Values.fileSecrets.data }}
          volumeMounts:
            {{- range $name, $spec := .Values.fileSecrets.data }}
            - name: file-secret-{{ $name }}
              mountPath: {{ $spec.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if and .Values.fileSecrets.enabled .Values.fileSecrets.data }}
      volumes:
        {{- range $name, $spec := .Values.fileSecrets.data }}
        - name: file-secret-{{ $name }}
          secret:
            secretName: {{ include "app.fullname" $ }}-{{ $name }}
            defaultMode: {{ $spec.defaultMode | default 0400 }}
            items:
              - key: {{ $spec.filename }}
                path: {{ $spec.filename }}
        {{- end }}
      {{- end }}
      {{- with .Values.migrations.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.migrations.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.migrations.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
