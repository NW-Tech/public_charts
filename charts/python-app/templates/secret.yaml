{{- if .Values.secrets.enabled -}}
{{- range $current_secret_name, $current_secret := .Values.secrets.data }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" $ }}- {{- $current_secret_name }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    cnpg.io/reload: "true"
type: Opaque
data:
    {{- range $key, $val := $current_secret }}
    {{- print $key | nindent 2 }}: {{ print $val | b64enc | quote -}}
    {{ end }}

---
{{ end }}
{{- /*
  secrets.dataRaw — values are written to Secret data verbatim, with no
  additional base64 encoding. Use this for content that is already
  base64-encoded
*/ -}}
{{- range $current_secret_name, $current_secret := .Values.secrets.dataRaw }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" $ }}- {{- $current_secret_name }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    cnpg.io/reload: "true"
type: Opaque
data:
    {{- range $key, $val := $current_secret }}
    {{- print $key | nindent 2 }}: {{ print $val | quote -}}
    {{ end }}

---
{{ end }}
{{- end -}}
